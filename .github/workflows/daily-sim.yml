name: Daily sweepstake sims

on:
  schedule:
    - cron: "14 4 * * *"   # 04:14 UTC = 05:14 UK summer time; upstream data refreshes ~04:00 UK. GitHub often dispatches scheduled runs hours late, so we aim early.
  workflow_dispatch:        # allows manual runs from the Actions tab

permissions:
  contents: write

jobs:
  simulate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run tournament simulations
        run: node sim/simulate.mjs --sims 10000
      - name: Commit updated odds
        run: |
          git config user.name "saints-sim-bot"
          git config user.email "actions@users.noreply.github.com"
          git add site/data/daily-sim.json
          git diff --staged --quiet && { echo "No change in odds; nothing to commit."; exit 0; }
          git commit -m "Daily sim $(date -u +%F)"
          # main may have moved on since checkout (e.g. a merge landed mid-run);
          # rebase onto the latest and retry the push a few times before failing.
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "Push rejected (attempt $i); rebasing on origin/main and retrying…"
            git pull --rebase origin main || exit 1
          done
          echo "Push still failing after retries." >&2
          exit 1
