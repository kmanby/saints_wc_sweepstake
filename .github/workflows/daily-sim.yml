name: Daily sweepstake sims

on:
  schedule:
    - cron: "14 4 * * *"   # 04:14 UTC = 05:14 UK summer time; upstream data refreshes ~04:00 UK. GitHub often dispatches scheduled runs hours late, so we aim early.
  workflow_dispatch:        # allows manual runs from the Actions tab

permissions:
  contents: write

jobs:
  simulate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: "24"
      - name: Run tournament simulations
        run: node sim/simulate.mjs --sims 10000
      - name: Commit updated odds
        run: |
          git config user.name "saints-sim-bot"
          git config user.email "actions@users.noreply.github.com"
          # Keep the freshly-generated odds AND the auto-refreshed official feed
          # snapshot aside, then always re-apply them on top of the very latest
          # main. This survives races (a merge or a concurrent run landing
          # mid-job): each retry resets to origin/main, so the push is a clean
          # fast-forward and an identical file is a no-op. The fixture is our
          # rolling last-good backup for days the live feed is dark.
          cp site/data/daily-sim.json "$RUNNER_TEMP/daily-sim.json"
          cp sim/fixtures/wc2026.json "$RUNNER_TEMP/wc2026.json"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            cp "$RUNNER_TEMP/daily-sim.json" site/data/daily-sim.json
            cp "$RUNNER_TEMP/wc2026.json" sim/fixtures/wc2026.json
            git add site/data/daily-sim.json sim/fixtures/wc2026.json
            git diff --staged --quiet && { echo "Odds already current on main; nothing to commit."; exit 0; }
            git commit -m "Daily sim $(date -u +%F)"
            git push && exit 0
            echo "Push raced (attempt $i); refreshing main and retrying…"
          done
          echo "Push still failing after retries." >&2
          exit 1
